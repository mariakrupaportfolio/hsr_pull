      huohuo: "https://api.hakush.in/hsr/UI/avatarshopicon/1217.webp",
      bronya: "https://api.hakush.in/hsr/UI/avatarshopicon/1101.webp",
      bailu: "https://api.hakush.in/hsr/UI/avatarshopicon/1204.webp",
      phainon: "https://api.hakush.in/hsr/UI/avatarshopicon/1404.webp",
      sunday: "https://api.hakush.in/hsr/UI/avatarshopicon/1313.webp",
      cerydra: "https://api.hakush.in/hsr/UI/avatarshopicon/1406.webp",
      the_herta: "https://api.hakush.in/hsr/UI/avatarshopicon/1400.webp",
    };
    return remoteFallbacks[char.customIcon] || remoteFallbacks[char.id] || null;
  };

  const filteredChars = useMemo(() => {
    const upcomingIds = new Set(bannersToShow.map(b => b.character));
    return CHARACTERS
      .filter(c => {
        const matchSearch = c.name.toLowerCase().includes(search.toLowerCase());
        const matchFilter = filter === "All" || c.element === filter || c.path === filter || c.role === filter;
        return matchSearch && matchFilter;
      })
      .sort((a, b) => {
        const aUp = upcomingIds.has(a.id) ? 0 : 1;
        const bUp = upcomingIds.has(b.id) ? 0 : 1;
        return aUp - bUp;
      });
  }, [search, filter, bannersToShow]);

  const toggleOwned = (id) => setOwned(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);

  const analyze = async () => {
    setAnalyzing(true); setStep("loading");
    await new Promise(r => setTimeout(r, 1600));
    const ownedSet = new Set(owned);
    const ownedChars = CHARACTERS.filter(c => ownedSet.has(c.id));
    const roles = { DPS: 0, "Sub-DPS": 0, Support: 0, Healer: 0, Tank: 0 };
    ownedChars.forEach(c => { if (roles[c.role] !== undefined) roles[c.role]++; });
    const elements = {};
    ownedChars.forEach(c => { elements[c.element] = (elements[c.element] || 0) + 1; });
    const missingRoles = Object.entries(roles).filter(([,v]) => v === 0).map(([k]) => k);
    const wn = Math.max(1, (guaranteed ? 1 : 2) * 90 - pity);

    // ── Score upcoming banners ──────────────────────────────────────────────
    const scored = bannersToShow.map(banner => {
      const char = CHARACTERS.find(c => c.id === banner.character) || banner.liveCharData;
      if (!char) return { ...banner, char: null, score: 0, verdict:"skip", reasons:[], pullAdvice:"", eidolonAdvice:"" };
      let score = 0;
      const alreadyOwned = ownedSet.has(char.id);
      const synergiesOwned = (char.synergies || []).filter(s => ownedSet.has(s));
      const synNames = synergiesOwned.map(s => CHARACTERS.find(c=>c.id===s)?.name).filter(Boolean);

      // Score logic
      if (!alreadyOwned) {
        if (char.role === "DPS" && roles.DPS === 0) score += 40;
        else if (char.role === "DPS") score += 20;
        if (char.role === "Healer" && roles.Healer === 0) score += 35;
        if (char.role === "Support" && roles.Support < 2) score += 30;
        if (char.role === "Tank" && roles.Tank === 0) score += 30;
        if (missingRoles.includes(char.role)) score += 20;
        score += synergiesOwned.length * 20;
        if (wishes >= wn) score += 15;
        else score -= 15;
        // Tier bonus
        if (banner.tier === "SS") score += 25;
        else if (banner.tier === "SS+") score += 20;
        else if (banner.tier === "S") score += 10;
      } else {
        // Owned — eidolon value assessment
        score = 20; // base eidolon pull score
        if (synergiesOwned.length >= 2) score += 15;
        if (wishes >= wn) score += 10;
        else score -= 20;
      }

      // Build pull advice text
      let pullAdvice = "";
      let verdict = score >= 60 ? "must" : score >= 35 ? "consider" : "skip";

      if (alreadyOwned) {
        verdict = "eidolon";
        pullAdvice = `You already own ${char.name}. Pulling duplicates gives Eidolons — see below for whether they're worth it.`;
      } else {
        if (verdict === "must") {
          pullAdvice = banner.whyPull || `${char.name} fills a critical gap in your roster and has strong meta value.`;
        } else if (verdict === "consider") {
          pullAdvice = synNames.length > 0
            ? `${char.name} synergizes with ${synNames.join(", ")} you already own, which increases their value. ${banner.whyPull || ""}`
            : (banner.whyPull || `${char.name} is a solid pick but not urgent given your current roster.`);
        } else {
          pullAdvice = banner.whySkip || `Your roster already covers ${char.role} well. Consider saving wishes for a future banner.`;
        }
      }

      // Wishes feasibility note
      const wishNote = wishes >= wn
        ? `You have enough wishes (need ~${wn}, have ${wishes}).`
        : `You may not have enough wishes — need ~${wn} but only have ${wishes}. Save more before pulling.`;

      // Team tip
      const teamNote = banner.teamTip ? `Team: ${banner.teamTip}` : "";

      // Synergy note
      const synergyNote = synNames.length > 0
        ? `Works great with your: ${synNames.join(", ")}.`
        : "You don't own their best synergy partners yet — consider their team requirements.";

      return {
        ...banner, char, score, verdict,
        pullAdvice, wishNote, teamNote, synergyNote,
        eidolonNotes: banner.eidolonNotes || [],
        alreadyOwned,
      };
    });
    scored.sort((a, b) => b.score - a.score);

    // ── Score owned characters for "should I E1/E2?" advice ─────────────────
    const ownedAdvice = ownedChars
      .filter(c => c.rarity === 5)
      .map(c => {
        const syns = (c.synergies||[]).filter(s => ownedSet.has(s));
        const tierEntry = TIER_LIST.flatMap(t => t.characters).find(tc => tc.id === c.id);
        const tier = TIER_LIST.find(t => t.characters.some(tc => tc.id === c.id))?.tier || "?";
        return {
          ...c,
          tier,
          note: tierEntry?.note || c.desc,
          synergyCount: syns.length,
          synergyNames: syns.map(s=>CHARACTERS.find(ch=>ch.id===s)?.name).filter(Boolean),
        };
      })
      .sort((a,b) => {
        const tierOrder = {"SS":0,"SS+":1,"S":2,"S-":3,"A":4,"B":5,"?":6};
        return (tierOrder[a.tier]??6) - (tierOrder[b.tier]??6);
      });

    setResults({ scored, roles, elements, missingRoles, ownedAdvice, wishesNeeded: wn });
    setStep("results"); setAnalyzing(false);
  };

const wishesNeeded = Math.max(1, (guaranteed ? 1 : 2) * 90 - pity);
  const canAnalyze = owned.length > 0 || wishes > 0;

  // ── Shared styles ──────────────────────────────────────────────────────────
  const panelStyle = {
    background: "linear-gradient(135deg, rgba(20,25,60,0.92) 0%, rgba(15,20,50,0.92) 100%)",
    border: "1px solid rgba(80,100,200,0.3)", borderRadius: 16,
    padding: "28px 32px", backdropFilter: "blur(10px)",
  };

  // ── Render ─────────────────────────────────────────────────────────────────
  return (
    <div style={{ minHeight:"100vh", background:"#050812", fontFamily:"'Rajdhani', 'Orbitron', monospace", color:"#e8e8f0", position:"relative", overflow:"hidden" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;600;800&display=swap');
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0a0d1a}::-webkit-scrollbar-thumb{background:#3a4080;border-radius:4px}
        .char-card{transition:all .22s cubic-bezier(.34,1.56,.64,1);cursor:pointer;position:relative}
        .char-card:hover{transform:translateY(-4px) scale(1.04)}
        .char-card.owned{box-shadow:0 0 18px rgba(120,200,255,.4)}
        .glow-btn{transition:all .18s ease;cursor:pointer;border:none}
        .glow-btn:hover{filter:brightness(1.2);transform:translateY(-1px)}
        .glow-btn:active{transform:translateY(0)}
        .filter-pill{transition:all .15s ease;cursor:pointer;white-space:nowrap}
        .filter-pill:hover{filter:brightness(1.3)}
        .tl-card{transition:all .2s ease;cursor:default}
        .tl-char{transition:transform .18s ease;cursor:pointer;position:relative}
        .tl-char:hover{transform:scale(1.08) translateY(-3px)}
        @keyframes pulse-glow{0%,100%{opacity:.6}50%{opacity:1}}
        @keyframes slideIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        .result-card{animation:slideIn .38s ease forwards}
        .result-card:nth-child(2){animation-delay:.1s;opacity:0}
        .result-card:nth-child(3){animation-delay:.2s;opacity:0}
      `}</style>

      {/* BG */}
      <div style={{ position:"fixed",inset:0,zIndex:0,backgroundImage:"linear-gradient(rgba(60,80,200,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(60,80,200,.04) 1px,transparent 1px)",backgroundSize:"60px 60px",pointerEvents:"none" }} />
      <div style={{ position:"fixed",inset:0,zIndex:0,pointerEvents:"none" }}>
        <div style={{ position:"absolute",top:"8%",left:"12%",width:400,height:400,borderRadius:"50%",background:"radial-gradient(circle,rgba(80,40,200,.12) 0%,transparent 70%)",animation:"pulse-glow 4s ease-in-out infinite" }} />

      </div>

      <div style={{ position:"relative",zIndex:1,maxWidth:1140,margin:"0 auto",padding:"0 20px 60px" }}>

        {/* Header */}
        <div style={{ textAlign:"center",padding:"44px 0 20px" }}>
          <div style={{ fontSize:11,letterSpacing:6,color:"#6080c0",textTransform:"uppercase",marginBottom:10 }}>Interastral Peace Corporation</div>
          <h1 style={{ fontSize:"clamp(30px,5.5vw,52px)",fontFamily:"Orbitron,monospace",fontWeight:800,margin:0,background:"linear-gradient(135deg,#a0c4ff 0%,#c8a0ff 40%,#ffa0c8 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:2 }}>WARP ADVISOR</h1>

          {[["advisor","◈ Pull Advisor"],["tierlist","◆ Tier List"]].map(([id,label]) => (

                fontFamily:"Orbitron,monospace",fontWeight:600,

            >{label}</button>

        {/* ──────────────── PULL ADVISOR TAB ──────────────── */}

          <div>
            {step === "setup" && (
              <div>

                    {[
                      { label:"Wishes Available", val:wishes, set:setWishes, max:999, icon:"◆" },
                      { label:"Current Pity",     val:pity,   set:setPity,   max:89,  icon:"◎" },

                      <div key={label}>

                        </div>
                      </div>
                    ))}
                    <div>
                      <div style={{ fontSize:12,color:"#8090b0",marginBottom:8,letterSpacing:1 }}>◈ 50/50 Status</div>
                      <button className="glow-btn" onClick={()=>setGuaranteed(!guaranteed)} style={{
                        background: guaranteed ? "linear-gradient(135deg,rgba(80,200,120,.3),rgba(40,160,80,.3))" : "linear-gradient(135deg,rgba(200,80,80,.3),rgba(160,40,40,.3))",
                        border:`1px solid ${guaranteed ? "rgba(80,200,120,.5)" : "rgba(200,80,80,.5)"}`,
                        borderRadius:10,padding:"10px 20px",color:guaranteed?"#80ff80":"#ff8080",
                        fontSize:13,letterSpacing:1,width:"100%",fontFamily:"Rajdhani",
                      }}>{guaranteed ? "✓ GUARANTEED" : "◎ ON 50/50"}</button>
                    </div>
                  </div>
                  {wishes > 0 && (
                    <div style={{ marginTop:18,padding:"10px 16px",background:"rgba(80,100,220,.1)",borderRadius:10,border:"1px solid rgba(80,100,220,.2)",fontSize:13,color:"#a0b0d0" }}>
                      ◆ With <strong style={{color:"#c0d0ff"}}>{wishes} wishes</strong> at pity <strong style={{color:"#c0d0ff"}}>{pity}</strong> {guaranteed?"(guaranteed)":"(50/50)"} — you can expect approximately <strong style={{color:"#ffd080"}}>{Math.floor(wishes/wishesNeeded)} guaranteed 5★</strong>
                    </div>
                  )}
                </div>

                {/* Character selector */}
                <div style={{ ...panelStyle }}>
                  <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18,flexWrap:"wrap",gap:10 }}>
                    <div style={{ fontSize:11,letterSpacing:4,color:"#6080c0",textTransform:"uppercase" }}>◆ Your Roster {owned.length>0&&<span style={{color:"#a0c0ff"}}>({owned.length} selected)</span>}</div>
                    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..." style={{ background:"rgba(80,100,200,.1)",border:"1px solid rgba(80,100,200,.3)",borderRadius:8,padding:"7px 14px",color:"#e0e8ff",fontSize:13,outline:"none",fontFamily:"Rajdhani",width:170 }} />
                  </div>
                  <div style={{ display:"flex",gap:7,marginBottom:18,flexWrap:"wrap" }}>
                    {["All","DPS","Support","Healer","Tank","Sub-DPS"].map(f => (
                      <button key={f} className="filter-pill" onClick={()=>setFilter(f)} style={{ background:filter===f?"rgba(100,120,255,.3)":"rgba(40,50,100,.3)",border:`1px solid ${filter===f?"rgba(100,120,255,.6)":"rgba(60,80,140,.3)"}`,borderRadius:20,padding:"5px 13px",fontSize:12,color:filter===f?"#c0d0ff":"#6080a0",fontFamily:"Rajdhani",letterSpacing:1 }}>{f}</button>
                    ))}
                    <div style={{ width:1,background:"rgba(80,100,180,.3)",margin:"0 3px" }} />
                    {["Fire","Ice","Wind","Lightning","Quantum","Imaginary","Physical"].map(el => {
                      const ec=ELEMENT_COLORS[el];
                      return <button key={el} className="filter-pill" onClick={()=>setFilter(el)} style={{ background:filter===el?`${ec.bg}30`:"rgba(40,50,100,.3)",border:`1px solid ${filter===el?ec.glow:"rgba(60,80,140,.3)"}`,borderRadius:20,padding:"5px 13px",fontSize:12,color:filter===el?ec.text:"#6080a0",fontFamily:"Rajdhani",letterSpacing:1 }}>{el}</button>;
                    })}
                  </div>

                  <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(86px,1fr))",gap:9 }}>
                    {filteredChars.map(char => {
                      const isOwned=owned.includes(char.id); const el=ELEMENT_COLORS[char.element];
                      const imgSrc = getImg(char);
                      return (
                        <div key={char.id} className={`char-card ${isOwned?"owned":""}`} onClick={()=>toggleOwned(char.id)} onMouseEnter={()=>setHoveredChar(char.id)} onMouseLeave={()=>setHoveredChar(null)} style={{ borderRadius:12,overflow:"hidden",border:isOwned?`2px solid ${el.glow}`:"2px solid rgba(60,80,140,.4)",background:isOwned?`linear-gradient(180deg,${el.bg}20 0%,${el.bg}10 100%)`:"rgba(20,28,60,.6)" }}>
                          <div style={{ height:3,background:el.bg,opacity:isOwned?1:.3 }} />
                          <div style={{ background:isOwned?`${el.bg}15`:"rgba(10,15,40,.8)",padding:"7px 7px 3px",textAlign:"center" }}>
                            {imgSrc && !imgErrors[char.id] ? (
                              <img src={imgSrc} alt={char.name} onError={()=>setImgErrors(prev=>({...prev,[char.id]:true}))} style={{ width:58,height:58,objectFit:"cover",borderRadius:8,filter:isOwned?"none":"grayscale(60%) brightness(.7)" }} />
                            ) : (
                              <div style={{ width:58,height:58,borderRadius:8,background:`${el.bg}30`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,margin:"0 auto" }}>{PATH_ICONS[char.path]||"?"}</div>
                            )}
                          </div>
                          <div style={{ padding:"3px 5px 7px",textAlign:"center" }}>
                            <div style={{ fontSize:10,fontWeight:600,color:isOwned?"#e0eaff":"#6070a0",letterSpacing:.4,lineHeight:1.2 }}>{char.name}</div>
                            <div style={{ fontSize:9,color:el.glow,marginTop:2 }}>{char.element}</div>
                          </div>
                          {isOwned && <div style={{ position:"absolute",top:5,right:5,width:17,height:17,borderRadius:"50%",background:el.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10 }}>✓</div>}
                          {new Set(bannersToShow.map(b=>b.character)).has(char.id) && <div style={{ position:"absolute",top:4,left:4,background:"rgba(255,200,0,.9)",borderRadius:4,padding:"1px 4px",fontSize:7,fontWeight:700,color:"#000",letterSpacing:.5 }}>BANNER</div>}
                          {hoveredChar===char.id && (
                            <div style={{ position:"absolute",bottom:"106%",left:"50%",transform:"translateX(-50%)",background:"rgba(8,12,30,.97)",border:`1px solid ${el.glow}40`,borderRadius:8,padding:"9px 12px",width:175,zIndex:100,fontSize:11,color:"#b0c0e0",lineHeight:1.5,pointerEvents:"none" }}>

                              <div>{char.desc}</div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                    {filteredChars.length===0 && <div style={{ gridColumn:"1/-1",textAlign:"center",padding:36,color:"#4060a0" }}>No characters found</div>}
                  </div>
                </div>

                <div style={{ textAlign:"center",marginTop:28 }}>
                  <div style={{ marginBottom:16, display:"flex", gap:10, justifyContent:"center", flexWrap:"wrap" }}>
                    <button className="glow-btn" onClick={fetchLiveBanners} disabled={liveLoading} style={{ background:"rgba(20,60,40,.5)", border:"1px solid rgba(60,180,100,.4)", borderRadius:10, padding:"9px 20px", fontSize:12, letterSpacing:2, color:liveLoading?"#406050":"#80d0a0", fontFamily:"Rajdhani" }}>
                      {liveLoading ? "⟳ FETCHING..." : liveData ? "✓ LIVE DATA LOADED · REFRESH" : "⟳ FETCH LIVE BANNERS"}
                    </button>
                    {liveError && <div style={{fontSize:11,color:"#ff8060",alignSelf:"center"}}>{liveError}</div>}
                    {liveData && <div style={{fontSize:11,color:"#60a080",alignSelf:"center"}}>Updated: {liveData.fetchedAt}</div>}
                  </div>
                  <button className="glow-btn" onClick={analyze} disabled={!canAnalyze} style={{ background:canAnalyze?"linear-gradient(135deg,#4040c0 0%,#6020a0 50%,#8030c0 100%)":"rgba(40,50,80,.4)",border:canAnalyze?"1px solid rgba(120,80,255,.6)":"1px solid rgba(40,50,80,.4)",borderRadius:14,padding:"15px 44px",fontSize:16,letterSpacing:3,textTransform:"uppercase",color:canAnalyze?"#e0d0ff":"#304060",fontFamily:"Orbitron,monospace",fontWeight:600,boxShadow:canAnalyze?"0 0 36px rgba(100,60,200,.4)":"none",opacity:canAnalyze?1:.5 }}>◈ ANALYZE WARPS ◈</button>
                  {!canAnalyze && <div style={{ marginTop:10,color:"#304060",fontSize:12,letterSpacing:1 }}>Select characters you own or enter your wish count</div>}
                </div>
              </div>
            )}

            {step === "loading" && (
              <div style={{ textAlign:"center",padding:"80px 20px" }}>
                <div style={{ width:76,height:76,margin:"0 auto 28px",border:"2px solid rgba(80,100,220,.2)",borderTop:"2px solid #a080ff",borderRadius:"50%",animation:"spin 1s linear infinite" }} />
                <div style={{ fontFamily:"Orbitron",fontSize:15,color:"#a080ff",letterSpacing:3 }}>CALCULATING FATE</div>
                <div style={{ marginTop:10,color:"#4060a0",fontSize:12,letterSpacing:2 }}>Consulting the Astral Express...</div>
              </div>
            )}

            {step === "results" && results && (
              <div>
                <button className="glow-btn" onClick={()=>setStep("setup")} style={{ background:"rgba(40,50,100,.3)",border:"1px solid rgba(60,80,160,.4)",borderRadius:8,padding:"8px 18px",color:"#6080c0",fontSize:12,letterSpacing:2,fontFamily:"Rajdhani",marginBottom:22 }}>← BACK TO SETUP</button>

                {/* Summary row */}
                <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:28 }}>
                  {[
                    { label:"Roster Size",     value:owned.length,           color:"#a0c0ff", icon:"◈" },
                    { label:"Wishes",           value:wishes,                 color:"#ffd080", icon:"◆" },
                    { label:"Missing Roles",    value:results.missingRoles.length===0?"Complete!":results.missingRoles.join(", "), color:results.missingRoles.length===0?"#80ff80":"#ff8080", icon:"◎" },
                    { label:"50/50 Status",     value:guaranteed?"Guaranteed":"On 50/50", color:guaranteed?"#80ff80":"#ffa060", icon:"◇" },
                  ].map(({label,value,color,icon})=>(
                    <div key={label} style={{ background:"rgba(20,28,60,.8)",border:"1px solid rgba(60,80,160,.3)",borderRadius:12,padding:"12px 16px" }}>
                      <div style={{ fontSize:11,color:"#5070a0",letterSpacing:1,marginBottom:4 }}>{icon} {label}</div>
                      <div style={{ fontSize:16,fontFamily:"Orbitron",color,fontWeight:600 }}>{value}</div>
                    </div>
                  ))}
                </div>

                {/* ── UPCOMING BANNERS ── */}
                <div style={{ fontSize:11,letterSpacing:4,color:"#6080c0",textTransform:"uppercase",marginBottom:16 }}>◆ Upcoming Banner Recommendations</div>

                {results.scored.map((banner,i)=>{
                  const char = banner.char; if(!char) return null;
                  const el = ELEMENT_COLORS[char.element]||ELEMENT_COLORS.Physical;
                  const imgSrc = getImg(char);
                  const verdictConfig = {
                    must:    { label:"★ MUST PULL",   color:"#ffd700", bg:"rgba(255,210,0,.12)",  border:"rgba(255,210,0,.4)" },
                    consider:{ label:"◇ CONSIDER",    color:"#80c0ff", bg:"rgba(80,160,255,.08)", border:"rgba(80,160,255,.3)" },
                    skip:    { label:"✗ SKIP",        color:"#ff6060", bg:"rgba(255,60,60,.06)",  border:"rgba(255,60,60,.25)" },
                    eidolon: { label:"◈ EIDOLONS?",   color:"#c080ff", bg:"rgba(160,80,255,.08)", border:"rgba(160,80,255,.3)" },
                  }[banner.verdict] || { label:"—", color:"#666", bg:"transparent", border:"rgba(60,80,160,.3)" };

                  return (
                    <div key={banner.id} className="result-card" style={{ background:`linear-gradient(135deg,rgba(20,28,60,.97),rgba(15,22,50,.97))`,border:`1px solid ${i===0&&banner.verdict==="must"?el.glow+"70":verdictConfig.border}`,borderRadius:16,padding:"24px 28px",marginBottom:20,backdropFilter:"blur(10px)",position:"relative",overflow:"hidden" }}>
                      {i===0 && banner.verdict!=="skip" && <div style={{ position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,${el.glow},transparent)` }} />}

                      {/* Header row */}
                      <div style={{ display:"flex",gap:20,alignItems:"flex-start",flexWrap:"wrap" }}>
                        {/* Portrait */}
                        <div style={{ flexShrink:0 }}>
                          <div style={{ width:86,height:86,borderRadius:13,border:`2px solid ${el.glow}70`,overflow:"hidden",background:`linear-gradient(180deg,${el.bg}30,${el.bg}08)`,boxShadow:`0 0 20px ${el.bg}40` }}>
                            {imgSrc&&!imgErrors["r_"+char.id]?<img src={imgSrc} alt={char.name} onError={()=>setImgErrors(p=>({...p,["r_"+char.id]:true}))} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32}}>{PATH_ICONS[char.path]||"◈"}</div>}
                          </div>
                          <div style={{ marginTop:6,textAlign:"center",fontSize:9,color:"#4060a0" }}>{banner.type}</div>
                        </div>

                        {/* Main info */}
                        <div style={{ flex:1,minWidth:200 }}>
                          <div style={{ display:"flex",alignItems:"center",gap:10,marginBottom:6,flexWrap:"wrap" }}>
                            <div style={{ fontFamily:"Orbitron",fontSize:20,color:"#e8eaff",fontWeight:600 }}>{char.name}</div>
                            <div style={{ fontSize:11,color:verdictConfig.color,letterSpacing:2,fontWeight:700,background:verdictConfig.bg,border:`1px solid ${verdictConfig.border}`,borderRadius:6,padding:"2px 10px" }}>{verdictConfig.label}</div>
                            {banner.tier && <div style={{ fontSize:11,color:"#a0b0d0",background:"rgba(60,70,120,.4)",border:"1px solid rgba(80,100,180,.3)",borderRadius:6,padding:"2px 8px" }}>Tier {banner.tier}</div>}
                          </div>
                          <div style={{ display:"flex",gap:6,marginBottom:10,flexWrap:"wrap" }}>
                            {[{l:char.element,c:el.bg,t:el.text},{l:char.path,c:"rgba(80,80,140,.4)",t:"#a0b0d0"},{l:char.role,c:"rgba(60,100,80,.4)",t:"#80c0a0"},{l:"5★",c:"rgba(120,80,20,.4)",t:"#ffd080"}].map(({l,c,t})=><span key={l} style={{background:c,borderRadius:6,padding:"2px 9px",fontSize:11,color:t,letterSpacing:1}}>{l}</span>)}
                          </div>

                          {/* Pull advice */}
                          <div style={{ fontSize:13,color:"#c0cce8",lineHeight:1.6,marginBottom:10,padding:"10px 14px",background:"rgba(40,60,120,.15)",borderRadius:8,border:"1px solid rgba(60,80,160,.2)",borderLeft:`3px solid ${verdictConfig.color}` }}>
                            {banner.pullAdvice}
                          </div>

                          {/* Info pills */}
                          <div style={{ display:"flex",flexDirection:"column",gap:6 }}>
                            <div style={{ fontSize:12,color:"#7090b0",display:"flex",gap:8,alignItems:"flex-start" }}>
                              <span style={{color:"#5080a0",flexShrink:0}}>◆</span>
                              <span>{banner.synergyNote}</span>
                            </div>
                            <div style={{ fontSize:12,color:"#7090b0",display:"flex",gap:8,alignItems:"flex-start" }}>
                              <span style={{color:"#5080a0",flexShrink:0}}>◎</span>
                              <span>{banner.wishNote}</span>
                            </div>
                            {banner.teamNote && (
                              <div style={{ fontSize:12,color:"#7090b0",display:"flex",gap:8,alignItems:"flex-start" }}>
                                <span style={{color:"#5080a0",flexShrink:0}}>◈</span>
                                <span>{banner.teamNote}</span>
                              </div>
                            )}
                          </div>
                        </div>

                        {/* Score */}
                        <div style={{ flexShrink:0,textAlign:"center" }}>
                          <div style={{ fontSize:9,color:"#4060a0",letterSpacing:1,marginBottom:6 }}>PULL SCORE</div>
                          <div style={{ width:64,height:64,borderRadius:"50%",border:`2px solid ${banner.score>=60?el.glow:banner.score>=35?"#8080c0":"#503050"}`,display:"flex",alignItems:"center",justifyContent:"center",background:`${banner.score>=60?el.bg:"#181828"}20`,boxShadow:banner.score>=60?`0 0 16px ${el.bg}50`:"none" }}>
                            <div style={{ fontFamily:"Orbitron",fontSize:18,fontWeight:800,color:banner.score>=60?el.glow:banner.score>=35?"#7070c0":"#503060" }}>{Math.max(0,Math.min(99,banner.score))}</div>
                          </div>
                        </div>
                      </div>

                      {/* Eidolon breakdown */}
                      {banner.eidolonNotes && banner.eidolonNotes.length > 0 && (
                        <div style={{ marginTop:16,padding:"12px 16px",background:"rgba(100,60,200,.07)",border:"1px solid rgba(120,60,220,.2)",borderRadius:10 }}>
                          <div style={{ fontSize:10,letterSpacing:3,color:"#8060c0",marginBottom:8,textTransform:"uppercase" }}>Eidolon Value & Copies Needed</div>
                          <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:6 }}>
                            {banner.eidolonNotes.map((note,ni)=>{
                              const alreadyE = banner.alreadyOwned ? 1 : 0;
                              const copiesNeeded = Math.max(0, (ni + alreadyE) - (banner.alreadyOwned ? 1 : 0));
                              const wishesForCopies = copiesNeeded * (guaranteed ? 90 : 180);
                              const worthIt = ni===0 || ni===1 ? "high" : ni===2 ? "medium" : "low";
                              const worthColor = worthIt==="high"?"#c080ff":worthIt==="medium"?"#9060d0":"#504060";
                              return (
                              <div key={ni} style={{ fontSize:11,color:"#9090b8",display:"flex",gap:8,alignItems:"flex-start",padding:"6px 8px",background:"rgba(80,40,160,.08)",borderRadius:6,border:`1px solid ${worthColor}20` }}>
                                <span style={{ color:worthColor,fontWeight:700,flexShrink:0,fontFamily:"Orbitron",fontSize:11,minWidth:22 }}>E{ni}</span>
                                <div style={{flex:1}}>
                                  <div style={{ color:ni===0?"#d0c0f8":ni<=2?"#a090d0":"#605080",marginBottom:2 }}>{note.split(" — ").slice(1).join(" — ") || note}</div>
                                  {ni > 0 && <div style={{fontSize:10,color:"#6050a0"}}>
                                    {copiesNeeded} extra {copiesNeeded===1?"copy":"copies"} · ~{copiesNeeded*(guaranteed?90:180)} wishes
                                  </div>}
                                </div>
                              </div>
                            )})}
                          </div>
                          {banner.alreadyOwned && <div style={{marginTop:8,fontSize:11,color:"#7060a0"}}>You own E0 — each eidolon needs 1 additional copy (~{guaranteed?90:180} wishes on 50/50)</div>}
                        </div>
                      )}
                    </div>
                  );
                })}

                {/* ── OWNED CHARACTERS ANALYSIS ── */}
                {results.ownedAdvice && results.ownedAdvice.length > 0 && (
                  <div style={{ marginTop:32 }}>
                    <div style={{ fontSize:11,letterSpacing:4,color:"#6080c0",textTransform:"uppercase",marginBottom:16 }}>◆ Your Roster — Investment Guide</div>
                    <div style={{ fontSize:12,color:"#4060a0",marginBottom:16 }}>Your owned 5★ characters ranked by current meta tier. Focus upgrade resources on top-tier units first.</div>

                    <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
                      {results.ownedAdvice.map((char)=>{
                        const el = ELEMENT_COLORS[char.element]||ELEMENT_COLORS.Physical;
                        const imgSrc = getImg(char);
                        const tierColors = { SS:"#ff3030", "SS+":"#ff7020", S:"#ffd020", "S-":"#60d060", A:"#50b0ff", B:"#9090a0" };
                        const tierCol = tierColors[char.tier] || "#666";
                        return (
                          <div key={char.id} style={{ display:"flex",gap:16,alignItems:"center",background:"rgba(18,24,54,.85)",border:`1px solid rgba(60,80,160,.25)`,borderLeft:`3px solid ${tierCol}`,borderRadius:12,padding:"14px 18px",flexWrap:"wrap" }}>
                            {/* Portrait */}
                            <div style={{ width:52,height:52,borderRadius:10,overflow:"hidden",border:`1.5px solid ${el.glow}50`,flexShrink:0,background:`${el.bg}15` }}>
                              {imgSrc&&!imgErrors["o_"+char.id]?<img src={imgSrc} alt={char.name} onError={()=>setImgErrors(p=>({...p,["o_"+char.id]:true}))} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{PATH_ICONS[char.path]||"◈"}</div>}
                            </div>
                            {/* Info */}
                            <div style={{ flex:1,minWidth:160 }}>
                              <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap" }}>
                                <span style={{ fontFamily:"Orbitron",fontSize:14,color:"#d0d8f8",fontWeight:600 }}>{char.name}</span>
                                <span style={{ fontSize:10,color:tierCol,fontWeight:700,letterSpacing:2,background:`${tierCol}15`,border:`1px solid ${tierCol}40`,borderRadius:5,padding:"1px 7px" }}>Tier {char.tier}</span>
                                <span style={{ fontSize:10,color:el.glow,background:`${el.bg}20`,borderRadius:5,padding:"1px 7px" }}>{char.element}</span>
                                <span style={{ fontSize:10,color:"#6080a0",borderRadius:5,padding:"1px 7px",background:"rgba(40,50,100,.4)" }}>{char.role}</span>
                              </div>
                              <div style={{ fontSize:12,color:"#7080a0",lineHeight:1.5 }}>{char.note}</div>
                              {char.synergyNames.length>0 && <div style={{ fontSize:11,color:"#5070908",marginTop:3 }}>✦ In your roster pairs well with: <span style={{color:"#7090c0"}}>{char.synergyNames.join(", ")}</span></div>}
                            </div>
                            {/* Tier badge */}
                            <div style={{ flexShrink:0,width:44,height:44,borderRadius:"50%",border:`2px solid ${tierCol}`,display:"flex",alignItems:"center",justifyContent:"center",background:`${tierCol}10` }}>
                              <span style={{ fontFamily:"Orbitron",fontSize:11,fontWeight:800,color:tierCol }}>{char.tier}</span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* Roster role coverage */}
                <div style={{ ...{background:"linear-gradient(135deg,rgba(20,25,60,.92),rgba(15,20,50,.92))",border:"1px solid rgba(80,100,200,.3)",borderRadius:16,padding:"22px 26px",backdropFilter:"blur(10px)"},marginTop:28 }}>
                  <div style={{ fontSize:11,letterSpacing:4,color:"#6080c0",marginBottom:16,textTransform:"uppercase" }}>◆ Role Coverage</div>
                  <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:12 }}>
                    {Object.entries(results.roles).map(([role,count])=>(
                      <div key={role} style={{ padding:"10px 14px",background:count===0?"rgba(200,60,60,.1)":"rgba(60,200,80,.05)",border:`1px solid ${count===0?"rgba(200,60,60,.3)":"rgba(60,200,80,.2)"}`,borderRadius:10 }}>
                        <div style={{ fontSize:11,color:"#6080a0",marginBottom:3 }}>{role}</div>
                        <div style={{ fontFamily:"Orbitron",fontSize:19,color:count===0?"#ff8080":"#80c080" }}>{count}</div>
                        <div style={{ fontSize:10,color:count===0?"#ff6060":"#60a060",marginTop:2 }}>{count===0?"⚠ MISSING":"✓ covered"}</div>
                      </div>
                    ))}
                  </div>
                </div>

                <div style={{ textAlign:"center",marginTop:22 }}>
                  <button className="glow-btn" onClick={()=>setStep("setup")} style={{ background:"linear-gradient(135deg,rgba(40,50,120,.6),rgba(60,30,100,.6))",border:"1px solid rgba(80,100,200,.4)",borderRadius:10,padding:"11px 28px",color:"#8090d0",fontSize:12,letterSpacing:2,fontFamily:"Rajdhani" }}>← UPDATE ROSTER</button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ──────────────── TIER LIST TAB ──────────────── */}
        {tab === "tierlist" && (
          <div>
            <div style={{ ...panelStyle, marginBottom:24 }}>
              <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12 }}>
                <div>
                  <div style={{ fontSize:11,letterSpacing:4,color:"#6080c0",textTransform:"uppercase",marginBottom:4 }}>◆ Character Tier List</div>
                  <div style={{ fontSize:13,color:"#5070a0" }}>Updated for v4.0 · March 2026 · Based on MoC, PF & Apocalyptic Shadow</div>
                </div>
                <div style={{ display:"flex",gap:8,flexWrap:"wrap" }}>
                  {["All","DPS","Support","Healer","Tank","Sub-DPS"].map(f=>(
                    <button key={f} className="filter-pill" onClick={()=>setTlMode(f)} style={{ background:tlMode===f?"rgba(100,120,255,.3)":"rgba(40,50,100,.3)",border:`1px solid ${tlMode===f?"rgba(100,120,255,.6)":"rgba(60,80,140,.3)"}`,borderRadius:20,padding:"5px 13px",fontSize:12,color:tlMode===f?"#c0d0ff":"#6080a0",fontFamily:"Rajdhani",letterSpacing:1 }}>{f}</button>
                  ))}
                </div>
              </div>
            </div>

            {TIER_LIST.map(tier => {
              const chars = tlMode==="All" ? tier.characters : tier.characters.filter(c=>c.role===tlMode);
              if(chars.length===0) return null;
              return (
                <div key={tier.tier} className="tl-card" style={{ display:"flex",gap:0,marginBottom:12,borderRadius:14,overflow:"hidden",border:`1px solid ${tier.border}`,background:tier.bg,backdropFilter:"blur(8px)" }}>
                  {/* Tier label */}
                  <div style={{ width:70,flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"16px 8px",borderRight:`1px solid ${tier.border}`,background:`${tier.color}10`,gap:6 }}>
                    <div style={{ fontFamily:"Orbitron",fontSize:22,fontWeight:800,color:tier.color,textShadow:`0 0 20px ${tier.color}` }}>{tier.tier}</div>
                    <div style={{ fontSize:9,color:tier.color,letterSpacing:1,textAlign:"center",lineHeight:1.3,opacity:.8 }}>{tier.label.split("—")[1]?.trim()||""}</div>
                  </div>
                  {/* Characters */}
                  <div style={{ flex:1,display:"flex",flexWrap:"wrap",gap:10,padding:"14px 16px",alignItems:"flex-start" }}>
                    {chars.map(char=>{
                      const el=ELEMENT_COLORS[char.element]||ELEMENT_COLORS.Physical;
                      const isInRoster=owned.includes(char.id);
                      const imgSrc = getImg(char);
                      return (
                        <div key={char.id} className="tl-char" title={`${char.name} — ${char.note}`} style={{ width:70,textAlign:"center" }}>
                          <div style={{ width:64,height:64,borderRadius:12,overflow:"hidden",border:`2px solid ${isInRoster?el.glow:el.bg+"60"}`,background:`linear-gradient(180deg,${el.bg}25,${el.bg}08)`,margin:"0 auto",position:"relative",boxShadow:isInRoster?`0 0 14px ${el.bg}80`:`0 0 6px ${el.bg}30` }}>
                            {imgSrc&&!imgErrors["tl_"+char.id] ? (
                              <img src={imgSrc} alt={char.name} onError={()=>setImgErrors(prev=>({...prev,["tl_"+char.id]:true}))} style={{width:"100%",height:"100%",objectFit:"cover"}} />
                            ) : (
                              <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>{PATH_ICONS[char.path]||"◈"}</div>
                            )}
                            {isInRoster && <div style={{ position:"absolute",bottom:2,right:2,width:14,height:14,borderRadius:"50%",background:el.glow,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#000" }}>✓</div>}
                            {char.rarity===5 && <div style={{ position:"absolute",top:2,left:2,fontSize:8,color:"#ffd080",fontWeight:700,textShadow:"0 0 4px #000" }}>5★</div>}
                          </div>
                          <div style={{ marginTop:5,fontSize:9.5,color:"#b0c0d8",lineHeight:1.2,fontWeight:600 }}>{char.name}</div>
                          <div style={{ fontSize:8,color:el.glow,marginTop:1,opacity:.85 }}>{char.element}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}

            <div style={{ marginTop:20,padding:"14px 20px",background:"rgba(20,28,60,.7)",border:"1px solid rgba(60,80,140,.3)",borderRadius:12,fontSize:12,color:"#5070a0",lineHeight:1.7 }}>
              <span style={{color:"#7090c0",fontWeight:600}}>◆ Notes:</span> Characters marked with <span style={{color:"#80c0ff",fontWeight:600}}>✓</span> are in your roster. Ratings are at E0 with ideal setup. Source: Prydwen, Game8, Beebom, FRVR — v4.0 March 2026 consensus. Hover any character portrait for notes.
            </div>
          </div>
        )}

        <div style={{ textAlign:"center",marginTop:44,paddingTop:22,borderTop:"1px solid rgba(40,60,120,.3)",color:"#2a3050",fontSize:11,letterSpacing:2 }}>FAN-MADE TOOL · NOT AFFILIATED WITH HOYOVERSE · HONKAI: STAR RAIL v4.0</div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
